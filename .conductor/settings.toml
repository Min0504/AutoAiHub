#:schema https://conductor.build/schemas/settings.repo.schema.json
"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"
file_include_globs = ".env*\n"

[scripts]
setup = "mkdir -p .context && touch .context/handoff.md .context/fe-notes.md .context/be-notes.md .context/security-report.md .context/todos.md && npm install"
run = "npm run dev:api & API_PID=$!; trap 'kill $API_PID 2>/dev/null || true' EXIT HUP INT TERM; npx vite --host 127.0.0.1 --port $CONDUCTOR_PORT"
archive = "rm -rf node_modules dist server.js"
run_mode = "nonconcurrent"

[prompts]
general = "Follow AGENTS.md. Work only in this repo. FE/BE implement and summarize their own work; Security performs first-pass verification and fixes all found issues after PM says 검증 or 검증 단계로 넘겨; Lead performs second-pass verification and final synthesis after Security finishes."
code_review = "Focus on correctness, FE/BE API contract, auth/permission, secrets, file-boundary violations, and lint/typecheck/test/build evidence."
fix_errors = "Fix the smallest scoped issue within this repo and record failed commands or blockers in .context role notes."
create_pr = "Base PRs on master. Use 한것/검증/남은것 format. Summarize changed files, verification commands, Security result, and any PM approvals needed."
